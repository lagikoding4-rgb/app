name: Build Bonsamp APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Extract ZIP
        run: |
          ZIP=$(ls *.zip 2>/dev/null | head -1)
          echo "Ketemu ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted
          echo "=== Isi extracted ==="
          ls extracted/
          cp -r extracted/bonsamp_final/. . 2>/dev/null || cp -r extracted/*/. . 2>/dev/null || true
          echo "=== Cek file penting ==="
          ls -la gradlew 2>/dev/null || echo "gradlew tidak ada"
          ls app/ 2>/dev/null || echo "folder app tidak ada"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: gradle assembleDebug --project-dir . --stacktrace 2>&1 | tail -150

      - name: Cek hasil APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK tidak ditemukan"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bonsamp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          
