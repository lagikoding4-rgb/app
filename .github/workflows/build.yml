name: Build Bonsamp APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gradle
          gradle --version

      - name: Extract ZIP
        run: |
          ZIP=$(ls *.zip 2>/dev/null | head -1)
          echo "ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted
          cp -r extracted/bonsamp_final/. . 2>/dev/null || cp -r extracted/*/. . 2>/dev/null || true
          ls -la

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug --stacktrace 2>&1 | tail -200

      - name: Cek APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK tidak ditemukan"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bonsamp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
