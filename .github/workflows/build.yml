name: Build Bonsamp APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract ZIP
        run: |
          ZIP=$(ls *.zip 2>/dev/null | head -1)
          echo "ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted
          cp -r extracted/bonsamp_final/. . 2>/dev/null || cp -r extracted/*/. . 2>/dev/null || true
          ls -la

      - name: Fix Gradle version compatibility
        run: |
          # Turunkan AGP ke 7.4.2 yang support Gradle 7.6
          sed -i "s/com.android.tools.build:gradle:8.1.0/com.android.tools.build:gradle:7.4.2/g" build.gradle
          sed -i "s/compileSdk 34/compileSdk 33/g" app/build.gradle
          sed -i "s/targetSdk 34/targetSdk 33/g" app/build.gradle
          sed -i "s/compileSdkVersion 34/compileSdkVersion 33/g" app/build.gradle
          echo "=== build.gradle ==="
          cat build.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Download Gradle 7.6.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug --stacktrace 2>&1 | tail -200

      - name: Cek APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK tidak ditemukan"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bonsamp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
