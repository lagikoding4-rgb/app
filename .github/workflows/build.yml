name: Build Bonsamp APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 7.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Extract ZIP
        run: |
          ZIP=$(ls *.zip 2>/dev/null | head -1)
          echo "Ketemu ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted
          cp -r extracted/bonsamp_final/. . 2>/dev/null || cp -r extracted/*/. . 2>/dev/null || true
          ls -la

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tail -150

      - name: Cek hasil APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK tidak ditemukan"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bonsamp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
